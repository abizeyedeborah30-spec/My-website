<!DOCTYPE html>
<html>

<head>
  <title>Appointment</title>
  <style>
    body {
      font-family: Aerial, sans-serif;
      background-color: rgb(14, 245, 29);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 50vh;
      background-image: url("dollar.jpg");
    }

    .container {
      background: rgb(107, 213, 255);
      padding: 100px;
      border-radius: 12px;
      box-shadow: 0 5px 20px rgb(182, 18, 160);
      width: 10px;
      text-align: center;
    }

    h2 {
      margin-bottom: 20px;
    }

    input,
    select {
      width: 100%;
      padding: 8px;
      margin: 5px;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #1de00b;
    }

    .result {
      margin-top: 10px;
      font-weight: 10px;
    }
  </style>
</head>

<body>
  <div id="settings" class="page">
    <h3>Settings</h3>


    <label>Clinic Name</label>
    <input type="text" id="clinicName" class="form-control mb-2" placeholder="Enter clinic name">


    <label>Theme</label>
    <select id="theme" class="form-control mb-2">
      <option value="light">Light</option>
      <option value="dark">Dark</option>
    </select>

    <button class="btn btn-success w-100" onclick="saveSettings()">Save Settings</button>
  </div>
</body>

</html>
