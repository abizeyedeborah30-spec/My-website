<!DOCTYPE html>
<html>

<head>
  <title>Appointment</title>
  <style>
    body {
      font-family: Aerial, sans-serif;
      background-color: rgb(14, 245, 29);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 50vh;
      background-image: url("dollar.jpg");
    }

    .container {
      background: rgb(107, 213, 255);
      padding: 100px;
      border-radius: 12px;
      box-shadow: 0 5px 20px rgb(182, 18, 160);
      width: 10px;
      text-align: center;
    }

    h2 {
      margin-bottom: 20px;
    }

    input,
    select {
      width: 100%;
      padding: 8px;
      margin: 5px;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #1de00b;
    }

    .result {
      margin-top: 10px;
      font-weight: 10px;
    }

    .my-table {
      width: 100%;
      border-collapse: collapse;
    }

    .my-table th,
    .my-table td {
      border: 1px solid black;
      padding: 10px;
      text-align: center;
    }

    .my-table th {
      background-color: #2e7d32;
      color: white;
    }
  </style>
</head>

<body>
  <div id="dashboard" class="page active">
    <h2>Dashboard</h2>

    <div class="row">
      <div class="col-md-4">
        <div class="card p-3 bg-success text-white">

          <div class="row">
            Customer:
            <input type="text">
            <p id="totalPatients"></p>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card p-3 bg-primary text-white">

            <div class="row">
              products:
              <input type="text">



            </div>
            <p id="totalAppointments"></p>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card p-3 bg-warning text-dark">
            <h4>Table of products</h4>


            <table class="my-table">
              <tr>
                <th>#</th>
                <th>Name of products</th>
                <th>price</th>
                <th>quantity</th>
              </tr>

              <tr>
                <td>1</td>
                <td>beans</td>
                <td>2000frw</td>
                <td>20kg</td>
              </tr>

              <tr>
                <td>2</td>
                <td>rice</td>
                <td>200frw</td>
                <td>25kg</td>
              </tr>

              <tr>
                <td>3</td>
                <td>oil</td>
                <td>25000</td>
                <td>25l</td>
              </tr>
            </table>

          </div>
        </div>
      </div>
    </div>
</body>

</html>
