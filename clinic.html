<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>DEBORAH & ALICE Clinic</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: Arial;
    }

    .sidebar {
      width: 250px;
      height: 100vh;
      background: #1f6f2f;
      color: white;
      position: fixed;
      padding: 20px;
    }

    .menu-item {
      display: block;
      color: white;
      padding: 12px;
      margin-bottom: 10px;
      text-decoration: none;
      border-radius: 5px;
    }

    .menu-item:hover {
      background: #2e7d32;
    }

    .menu-item.active {
      background: #2e7d32;
    }

    .main {
      margin-left: 250px;
      padding: 20px;
      background: #f2f2f2;
      height: 100vh;
    }


    .page {
      display: none;
    }

    .page.active {
      display: block;
    }
  </style>
</head>

<body>
  <div class="sidebar">
    <h2>Menu</h2>
    <button><a href="Dashboard.html">Dashboard</a></button><br><br>
    <button><a href="Patients.html">Patients </a></button><br><br>
    <button><a href=" Appointments.html"> Appointments</a></button><br><br>
    <button><a href="Reports.html">Reports </a></button><br><br>
    <button><a href="Settings.html">Settings </a></button>
  </div>
  <div class="main">
    <div id="dashboard" class="page">📊 Dashboard Page</div>

    <div id="patients" class="page">
      <h3>Patient Registration</h3>
      <input type="text" placeholder="Patient Name" class="form-control mb-2">
      <input type="number" placeholder="Age" class="form-control mb-2">
      <select class="form-control mb-2">
        <option>Male</option>
        <option>Female</option>
      </select>
      <button class="btn btn-success w-100">Save Patient</button>
    </div>
    <div id="appointments" class="page">📅 Appointments Page</div>
    <div id="reports" class="page">📄 Reports Page</div>
    <div id="settings" class="page">⚙️ Settings Page</div>
  </div>
  </h3>
  <script>
    function showPage(event, pageId) {
      event.preventDefault();
      document.querySelectorAll(".page").forEach(p => {
        p.classList.remove("active");
      });
      document.getElementById(pageId).classList.add("active");
      document.querySelectorAll(".menu-item").forEach(btn => {
        btn.classList.remove("active");
      });
      event.target.classList.add("active");
    }
    document.addEventListener("DOMContentLoaded", () => {
      document.getElementById("dashboard").classList.add("active");
    });

  </script>
</body>

</html>
