<!DOCTYPE html>
<html>

<head>
  <title>Appointment</title>
  <style>
    body {
      font-family: Aerial, sans-serif;
      background-color: rgb(14, 245, 29);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 50vh;
      background-image: url("dollar.jpg");
    }

    .container {
      background: rgb(107, 213, 255);
      padding: 100px;
      border-radius: 12px;
      box-shadow: 0 5px 20px rgb(182, 18, 160);
      width: 10px;
      text-align: center;
    }

    h2 {
      margin-bottom: 20px;
    }

    input,
    select {
      width: 100%;
      padding: 8px;
      margin: 5px;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #1de00b;
    }

    .result {
      margin-top: 10px;
      font-weight: 10px;
    }
  </style>
</head>

<body>
  <div class="Appointments">
    <h2>Appointments</h2>
    <div class="row">
      Name:
      <input type="text">
    </div>
    <div class="row">
      Date:
      <input type="number">
      <div class="row">
        PhoneNumber/ID:
        <input type="number">
        <div class="row">
          Time:
          <input type="number & text">
          <button>Save Appointments</button>
        </div>
      </div>
    </div>
  </div>
</body>

</html>
